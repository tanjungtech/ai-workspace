info:
  name: Stream Chat
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/chat/stream"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "conversationId": "demo",
        "message": "Explain JWT authentication"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
